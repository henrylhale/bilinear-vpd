<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QK Contribution Heatmaps</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #333; }
.app { display: flex; height: 100vh; }
.sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; padding: 16px; overflow-y: auto; flex-shrink: 0; }
.main { flex: 1; overflow-y: auto; padding: 16px; }
h2 { font-size: 14px; margin: 12px 0 6px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
h2:first-child { margin-top: 0; }
select, input[type=range] { width: 100%; margin: 4px 0 8px; }
select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
.pair-list { max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; padding: 4px; }
.pair-item { display: flex; align-items: center; padding: 3px 6px; font-size: 12px; font-family: monospace; cursor: pointer; border-radius: 3px; }
.pair-item:hover { background: #f0f0f0; }
.pair-item input { margin-right: 6px; }
.pair-item .score { color: #999; margin-left: auto; font-size: 11px; }
.select-controls { display: flex; gap: 8px; margin: 4px 0; }
.select-controls button { font-size: 11px; padding: 3px 8px; border: 1px solid #ccc; border-radius: 3px; background: #fff; cursor: pointer; }
.select-controls button:hover { background: #eee; }
.row-section { margin-bottom: 24px; }
.row-section h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #444; }
.heatmap-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.heatmap-container { flex-shrink: 0; }
.heatmap-container .head-label { text-align: center; font-size: 11px; font-weight: 600; margin-bottom: 2px; }
canvas { display: block; }
.metric { font-size: 12px; color: #666; margin: 4px 0; }
.metric .val { font-weight: 600; color: #333; }
.loading { text-align: center; padding: 40px; color: #999; }
.file-section { margin-bottom: 12px; }
.file-section p { font-size: 12px; color: #666; margin: 4px 0; }
.status { font-size: 12px; color: #888; font-style: italic; margin: 8px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <h2>Data</h2>
    <div class="file-section">
      <p>Load manifest.json, then layer files are loaded from the same directory.</p>
      <input type="file" id="manifest-input" accept=".json" webkitdirectory style="display:none">
      <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none">
      <button id="load-folder-btn" style="padding:8px 16px;background:#4a90d9;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px">Load output folder</button>
    </div>
    <div id="controls" style="display:none">
      <h2>Prompt</h2>
      <select id="prompt-select"></select>
      <h2>Layer</h2>
      <select id="layer-select"></select>
      <div class="status" id="status"></div>
      <div class="select-controls">
        <button id="select-all">Select all</button>
        <button id="select-none">Clear</button>
      </div>
      <h2>CI Markers</h2>
      <div style="font-size:12px;color:#555;margin-bottom:6px">
        Orange ticks beside token labels show where the row's Q/K component has CI &gt; threshold.
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px">
        <input type="checkbox" id="ci-toggle" checked>
        Show CI markers
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px">
        Threshold:
        <input type="number" id="ci-threshold" value="0.01" min="0" max="1" step="0.001" style="width:80px">
      </label>
      <h2>Pairs (q_c → k_c)</h2>
      <div class="pair-list" id="pair-list"></div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="loading" id="placeholder">Load an output folder to begin.</div>
    <div id="heatmaps" style="display:none"></div>
  </div>
</div>

<script>
// --- Colormaps ---
const VIRIDIS = generateColormap([
  [0.0, 68, 1, 84], [0.1, 72, 35, 116], [0.2, 64, 67, 135],
  [0.3, 52, 94, 141], [0.4, 41, 120, 142], [0.5, 32, 144, 140],
  [0.6, 34, 167, 132], [0.7, 68, 190, 112], [0.8, 121, 209, 81],
  [0.9, 189, 222, 38], [1.0, 253, 231, 37]
]);
const RDBU = generateColormap([
  [0.0, 5, 48, 97], [0.1, 33, 102, 172], [0.2, 67, 147, 195],
  [0.3, 146, 197, 222], [0.4, 209, 229, 240], [0.5, 247, 247, 247],
  [0.6, 253, 219, 199], [0.7, 244, 165, 130], [0.8, 214, 96, 77],
  [0.9, 178, 24, 43], [1.0, 103, 0, 31]
]);

function generateColormap(stops) {
  const cmap = new Array(256);
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let si = 0;
    for (let s = 0; s < stops.length - 1; s++) {
      if (t >= stops[s][0] && t <= stops[s+1][0]) { si = s; break; }
    }
    const f = (t - stops[si][0]) / (stops[si+1][0] - stops[si][0]);
    cmap[i] = [
      Math.round(stops[si][1] + f * (stops[si+1][1] - stops[si][1])),
      Math.round(stops[si][2] + f * (stops[si+1][2] - stops[si][2])),
      Math.round(stops[si][3] + f * (stops[si+1][3] - stops[si][3]))
    ];
  }
  return cmap;
}

const MASK_COLOR = [224, 224, 224];

// --- State ---
let manifest = null;
let fileMap = {};      // filename -> File object
let layerData = null;  // currently loaded layer data
let selectedPairs = new Set();
let ciShow = true;
let ciThreshold = 0.01;
const CI_TICK_COLOR = [255, 140, 0];  // orange

// --- DOM refs ---
const folderInput = document.getElementById('folder-input');
const promptSelect = document.getElementById('prompt-select');
const layerSelect = document.getElementById('layer-select');
const pairList = document.getElementById('pair-list');
const heatmapsDiv = document.getElementById('heatmaps');
const placeholder = document.getElementById('placeholder');
const controls = document.getElementById('controls');
const statusEl = document.getElementById('status');

// --- Folder loading ---
document.getElementById('load-folder-btn').addEventListener('click', () => folderInput.click());

folderInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  // Build file map (strip directory prefix)
  fileMap = {};
  for (const file of files) {
    const name = file.name;
    fileMap[name] = file;
  }

  if (!fileMap['manifest.json']) {
    placeholder.textContent = 'No manifest.json found in folder.';
    return;
  }

  placeholder.textContent = 'Loading manifest...';
  const text = await fileMap['manifest.json'].text();
  manifest = JSON.parse(text);
  initUI();
});

async function loadLayerFile(filename) {
  if (!fileMap[filename]) {
    statusEl.textContent = `File not found: ${filename}`;
    return null;
  }
  statusEl.textContent = `Loading ${filename}...`;
  const text = await fileMap[filename].text();
  statusEl.textContent = '';
  return JSON.parse(text);
}

function initUI() {
  document.querySelector('.file-section').style.display = 'none';
  controls.style.display = 'block';
  placeholder.style.display = 'none';
  heatmapsDiv.style.display = 'block';

  // Unique prompts
  const promptMap = new Map();
  for (const entry of manifest.entries) {
    if (!promptMap.has(entry.prompt_idx)) {
      promptMap.set(entry.prompt_idx, entry);
    }
  }

  promptSelect.innerHTML = '';
  for (const [pi, entry] of promptMap) {
    const opt = document.createElement('option');
    opt.value = pi;
    opt.textContent = `[${pi}] ${entry.text.slice(0, 50)}...`;
    promptSelect.appendChild(opt);
  }

  promptSelect.addEventListener('change', onPromptChange);
  layerSelect.addEventListener('change', onLayerChange);
  document.getElementById('select-all').addEventListener('click', selectAll);
  document.getElementById('select-none').addEventListener('click', selectNone);

  const ciToggle = document.getElementById('ci-toggle');
  const ciThreshInput = document.getElementById('ci-threshold');
  ciToggle.addEventListener('change', () => { ciShow = ciToggle.checked; render(); });
  ciThreshInput.addEventListener('change', () => {
    const v = parseFloat(ciThreshInput.value);
    if (!isNaN(v)) { ciThreshold = v; render(); }
  });

  onPromptChange();
}

function getEntriesForPrompt(pi) {
  return manifest.entries.filter(e => e.prompt_idx === pi);
}

function onPromptChange() {
  const pi = parseInt(promptSelect.value);
  const entries = getEntriesForPrompt(pi);

  const prevLayer = layerSelect.value;
  layerSelect.innerHTML = '';
  for (const entry of entries) {
    const opt = document.createElement('option');
    opt.value = entry.layer_idx;
    opt.textContent = `Layer ${entry.layer_idx} (${entry.n_q_alive}q × ${entry.n_k_alive}k)`;
    layerSelect.appendChild(opt);
  }
  if ([...layerSelect.options].some(o => o.value === prevLayer)) {
    layerSelect.value = prevLayer;
  }

  onLayerChange();
}

async function onLayerChange() {
  const pi = parseInt(promptSelect.value);
  const li = parseInt(layerSelect.value);
  const entry = manifest.entries.find(e => e.prompt_idx === pi && e.layer_idx === li);
  if (!entry) return;

  layerData = await loadLayerFile(entry.file);
  if (!layerData) return;

  updatePairList();
  render();
}

function updatePairList() {
  if (!layerData) return;
  pairList.innerHTML = '';

  // On first load (no selections yet), default to top 10
  const isFirstLoad = selectedPairs.size === 0;

  // Build set of valid keys for the current layer
  const validKeys = new Set();

  layerData.top_pairs.forEach(([qi, ki, score], idx) => {
    const qOrig = layerData.alive_q[qi];
    const kOrig = layerData.alive_k[ki];
    const key = `${qi},${ki}`;
    validKeys.add(key);

    const checked = isFirstLoad ? idx < 10 : selectedPairs.has(key);

    const div = document.createElement('div');
    div.className = 'pair-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = checked;
    cb.dataset.key = key;
    cb.addEventListener('change', onPairToggle);

    if (checked) selectedPairs.add(key);

    const label = document.createElement('span');
    label.textContent = `q.${qOrig} → k.${kOrig}`;
    const scoreSpan = document.createElement('span');
    scoreSpan.className = 'score';
    scoreSpan.textContent = score.toFixed(3);

    div.appendChild(cb);
    div.appendChild(label);
    div.appendChild(scoreSpan);
    pairList.appendChild(div);
  });

  // Remove selections that don't exist in the new layer
  for (const key of [...selectedPairs]) {
    if (!validKeys.has(key)) selectedPairs.delete(key);
  }

  render();
}

function onPairToggle(e) {
  const key = e.target.dataset.key;
  if (e.target.checked) selectedPairs.add(key);
  else selectedPairs.delete(key);
  render();
}

function selectAll() {
  const cbs = pairList.querySelectorAll('input[type=checkbox]');
  selectedPairs.clear();
  cbs.forEach(cb => { cb.checked = true; selectedPairs.add(cb.dataset.key); });
  render();
}

function selectNone() {
  const cbs = pairList.querySelectorAll('input[type=checkbox]');
  selectedPairs.clear();
  cbs.forEach(cb => { cb.checked = false; });
  render();
}

// --- Computation ---
function assembleHeatmap(ld, pairs) {
  const nH = ld.n_heads;
  const T = ld.tokens.length;
  const scale = ld.scale;
  const W = ld.W;
  const qActs = ld.q_acts;
  const kActs = ld.k_acts;

  const result = new Array(nH);
  for (let h = 0; h < nH; h++) {
    result[h] = new Array(T);
    for (let q = 0; q < T; q++) {
      result[h][q] = new Float64Array(T);
      result[h][q].fill(-Infinity);
    }
  }

  for (let h = 0; h < nH; h++) {
    for (let q = 0; q < T; q++) {
      for (let k = 0; k <= q; k++) {
        const delta = q - k;
        let val = 0;
        for (const [qi, ki] of pairs) {
          val += W[h][delta][qi][ki] * qActs[q][qi] * kActs[k][ki];
        }
        result[h][q][k] = scale * val;
      }
    }
  }
  return result;
}

function softmaxRows(logits) {
  const nH = logits.length;
  const T = logits[0].length;
  const result = new Array(nH);
  for (let h = 0; h < nH; h++) {
    result[h] = new Array(T);
    for (let q = 0; q < T; q++) {
      result[h][q] = new Float64Array(T);
      let maxVal = -Infinity;
      for (let k = 0; k <= q; k++) maxVal = Math.max(maxVal, logits[h][q][k]);
      let sumExp = 0;
      for (let k = 0; k <= q; k++) {
        const e = Math.exp(logits[h][q][k] - maxVal);
        result[h][q][k] = e;
        sumExp += e;
      }
      for (let k = 0; k <= q; k++) result[h][q][k] /= sumExp;
    }
  }
  return result;
}

// --- Rendering ---
function measureTokenLabelWidth(ctx, tokens, fontSize) {
  ctx.font = `${fontSize}px monospace`;
  let maxW = 0;
  for (const t of tokens) maxW = Math.max(maxW, ctx.measureText(t).width);
  return maxW;
}

function drawHeatmap(container, matrix, tokens, cmap, vmin, vmax, label, qCi, kCi) {
  const T = tokens.length;
  const cellPx = Math.max(4, Math.min(8, Math.floor(600 / T)));
  const gridW = T * cellPx;
  const gridH = T * cellPx;
  const fontSize = Math.max(6, Math.min(10, Math.floor(cellPx * 1.2)));
  const dpr = window.devicePixelRatio || 1;

  // Measure label space needed (at DPR scale for accurate measurement)
  const tmpCanvas = document.createElement('canvas');
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.font = `${fontSize * dpr}px monospace`;
  const maxLabelW = measureTokenLabelWidth(tmpCtx, tokens, fontSize * dpr) / dpr;
  const showCi = ciShow && (qCi || kCi);
  const ciTickW = showCi ? Math.max(3, Math.floor(cellPx * 0.7)) : 0;
  const ciGap = showCi ? 2 : 0;
  const yLabelMargin = maxLabelW + 4 + ciTickW + ciGap;
  const xLabelMargin = Math.round(maxLabelW * 0.707) + 4 + ciTickW + ciGap;

  const canvasW = yLabelMargin + gridW;
  const canvasH = gridH + xLabelMargin;

  const wrapper = document.createElement('div');
  wrapper.className = 'heatmap-container';

  const headLabel = document.createElement('div');
  headLabel.className = 'head-label';
  headLabel.textContent = label;
  wrapper.appendChild(headLabel);

  const canvas = document.createElement('canvas');
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  wrapper.appendChild(canvas);

  const ctx = canvas.getContext('2d');

  // Fill background at full DPR resolution
  ctx.scale(dpr, dpr);
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(0, 0, canvasW, canvasH);
  ctx.setTransform(1, 0, 0, 1, 0, 0); // reset transform

  // Draw heatmap cells with imageData at 1x resolution, then scale up
  // Use an offscreen canvas at 1x for the grid, then drawImage to scale it
  const gridCanvas = document.createElement('canvas');
  gridCanvas.width = gridW;
  gridCanvas.height = gridH;
  const gridCtx = gridCanvas.getContext('2d');
  const imageData = gridCtx.createImageData(gridW, gridH);
  const d = imageData.data;
  const range = vmax - vmin || 1;

  for (let q = 0; q < T; q++) {
    for (let k = 0; k < T; k++) {
      const val = matrix[q][k];
      let r, g, b;
      if (k > q || val === -Infinity) {
        [r, g, b] = MASK_COLOR;
      } else {
        const t = Math.max(0, Math.min(1, (val - vmin) / range));
        const ci = Math.round(t * 255);
        [r, g, b] = cmap[ci];
      }
      for (let py = q * cellPx; py < (q + 1) * cellPx; py++) {
        for (let px = k * cellPx; px < (k + 1) * cellPx; px++) {
          const idx = (py * gridW + px) * 4;
          d[idx] = r; d[idx+1] = g; d[idx+2] = b; d[idx+3] = 255;
        }
      }
    }
  }
  gridCtx.putImageData(imageData, 0, 0);

  // Draw the grid onto the main canvas, scaled to DPR, with nearest-neighbor
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(gridCanvas, 0, 0, gridW, gridH,
    yLabelMargin * dpr, 0, gridW * dpr, gridH * dpr);

  // Draw token labels at DPR scale for sharp text
  ctx.scale(dpr, dpr);
  ctx.imageSmoothingEnabled = true;
  ctx.fillStyle = '#333';
  ctx.font = `${fontSize}px monospace`;

  // Y-axis labels (leave room for CI ticks if present)
  const yLabelEnd = yLabelMargin - 3 - (showCi ? ciTickW + ciGap : 0);
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let q = 0; q < T; q++) {
    const y = q * cellPx + cellPx / 2;
    ctx.fillText(tokens[q], yLabelEnd, y);
  }

  // CI tick column on Y axis (between labels and grid)
  if (showCi && qCi) {
    const tickX = yLabelMargin - ciTickW;
    for (let q = 0; q < T; q++) {
      const ci = qCi[q] ?? 0;
      if (ci > ciThreshold) {
        const intensity = Math.min(1, ci / 0.5);
        const alpha = 0.3 + 0.7 * intensity;
        ctx.fillStyle = `rgba(${CI_TICK_COLOR[0]},${CI_TICK_COLOR[1]},${CI_TICK_COLOR[2]},${alpha})`;
        ctx.fillRect(tickX, q * cellPx + 1, ciTickW - 1, cellPx - 2);
      }
    }
    ctx.fillStyle = '#333';
  }

  // X-axis: rotated -45° (labels offset to leave room for CI ticks)
  const xLabelStart = gridH + 3 + (showCi ? ciTickW + ciGap : 0);
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  for (let k = 0; k < T; k++) {
    const x = yLabelMargin + k * cellPx + cellPx / 2;
    const y = xLabelStart;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-Math.PI / 4);
    ctx.fillText(tokens[k], 0, 0);
    ctx.restore();
  }

  // CI tick row on X axis (between grid and labels)
  if (showCi && kCi) {
    const tickY = gridH + 1;
    for (let k = 0; k < T; k++) {
      const ci = kCi[k] ?? 0;
      if (ci > ciThreshold) {
        const intensity = Math.min(1, ci / 0.5);
        const alpha = 0.3 + 0.7 * intensity;
        ctx.fillStyle = `rgba(${CI_TICK_COLOR[0]},${CI_TICK_COLOR[1]},${CI_TICK_COLOR[2]},${alpha})`;
        ctx.fillRect(yLabelMargin + k * cellPx + 1, tickY, cellPx - 2, ciTickW - 1);
      }
    }
    ctx.fillStyle = '#333';
  }

  container.appendChild(wrapper);
}

function addRow(parent, title, matrices, tokens, cmap, vmin, vmax, qCi, kCi) {
  const section = document.createElement('div');
  section.className = 'row-section';

  const h3 = document.createElement('h3');
  h3.textContent = title;
  section.appendChild(h3);

  const row = document.createElement('div');
  row.className = 'heatmap-row';
  matrices.forEach((mat, h) =>
    drawHeatmap(row, mat, tokens, cmap, vmin, vmax, `H${h}`, qCi, kCi)
  );
  section.appendChild(row);
  parent.appendChild(section);
}

function getColumn(matrix, idx) {
  if (!matrix) return null;
  return matrix.map(row => row[idx]);
}

function render() {
  const ld = layerData;
  if (!ld) { heatmapsDiv.innerHTML = '<div class="loading">No data loaded.</div>'; return; }

  const tokens = ld.tokens;
  const nH = ld.n_heads;
  const T = tokens.length;

  const pairs = [];
  for (const key of selectedPairs) {
    const [qi, ki] = key.split(',').map(Number);
    pairs.push([qi, ki]);
  }

  heatmapsDiv.innerHTML = '';

  // Alive-only model attention (always shown)
  const cmAttn = ld.component_model_attn;
  addRow(heatmapsDiv, 'Alive-only model attention (ground truth)', cmAttn, tokens, VIRIDIS, 0, 1);

  if (pairs.length > 0) {
    const logits = assembleHeatmap(ld, pairs);
    const attn = softmaxRows(logits);

    let maxAbs = 0;
    for (let h = 0; h < nH; h++)
      for (let q = 0; q < T; q++)
        for (let k = 0; k <= q; k++)
          maxAbs = Math.max(maxAbs, Math.abs(logits[h][q][k]));

    addRow(heatmapsDiv, `Sum of ${pairs.length} pairs (softmax attention)`, attn, tokens, VIRIDIS, 0, 1);
    addRow(heatmapsDiv, `Sum of ${pairs.length} pairs (pre-softmax logits)`, logits, tokens, RDBU, -maxAbs, maxAbs);

    // Individual pair rows (with CI tick markers when CI data is available)
    for (const [qi, ki] of pairs) {
      const qOrig = ld.alive_q[qi];
      const kOrig = ld.alive_k[ki];
      const singleLogits = assembleHeatmap(ld, [[qi, ki]]);
      let sMaxAbs = 0;
      for (let h = 0; h < nH; h++)
        for (let q = 0; q < T; q++)
          for (let k = 0; k <= q; k++)
            sMaxAbs = Math.max(sMaxAbs, Math.abs(singleLogits[h][q][k]));
      const qCiCol = getColumn(ld.q_ci, qi);
      const kCiCol = getColumn(ld.k_ci, ki);
      addRow(
        heatmapsDiv,
        `q.${qOrig} → k.${kOrig} (pre-softmax)`,
        singleLogits, tokens, RDBU, -sMaxAbs, sMaxAbs,
        qCiCol, kCiCol
      );
    }

    // Compute max error if all pairs selected
    if (pairs.length === ld.top_pairs.length) {
      let maxErr = 0;
      for (let h = 0; h < nH; h++)
        for (let q = 0; q < T; q++)
          for (let k = 0; k <= q; k++)
            maxErr = Math.max(maxErr, Math.abs(attn[h][q][k] - cmAttn[h][q][k]));
      const metric = document.createElement('div');
      metric.className = 'metric';
      metric.innerHTML = `Max |softmax(sum_all) - alive-only attn|: <span class="val">${maxErr.toExponential(4)}</span>`;
      heatmapsDiv.appendChild(metric);
    }
  }
}
</script>
</body>
</html>
